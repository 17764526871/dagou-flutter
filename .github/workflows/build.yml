name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发
    inputs:
      include_model:
        description: '是否包含模型文件（带模型约2.5GB，不带约50MB）'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: ${{ github.event.inputs.include_model == 'true' || startsWith(github.ref, 'refs/tags/') }}

      - name: Checkout LFS objects
        if: github.event.inputs.include_model == 'true' || startsWith(github.ref, 'refs/tags/')
        run: git lfs checkout

      - name: Comment out model assets
        if: github.event.inputs.include_model == 'false'
        run: |
          sed -i 's/^    - assets\/models\//#    - assets\/models\//' pubspec.yaml
          echo "已注释模型资源配置，构建不带模型的APK"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APK files
        run: |
          cd build/app/outputs/flutter-apk
          if [ "${{ github.event.inputs.include_model }}" == "true" ] || [ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]; then
            mv app-armeabi-v7a-release.apk app-armeabi-v7a-release-with-model.apk
            mv app-arm64-v8a-release.apk app-arm64-v8a-release-with-model.apk
            mv app-x86_64-release.apk app-x86_64-release-with-model.apk
          else
            mv app-armeabi-v7a-release.apk app-armeabi-v7a-release-no-model.apk
            mv app-arm64-v8a-release.apk app-arm64-v8a-release-no-model.apk
            mv app-x86_64-release.apk app-x86_64-release-no-model.apk
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
          body: |
            ## 下载说明

            ### 带模型版本（约2.5GB）
            - `app-arm64-v8a-release-with-model.apk` - 64位设备（推荐）
            - `app-armeabi-v7a-release-with-model.apk` - 32位设备
            - 下载后直接安装即可使用

            ### 不带模型版本（约50MB）
            - `app-arm64-v8a-release-no-model.apk` - 64位设备（推荐）
            - `app-armeabi-v7a-release-no-model.apk` - 32位设备
            - 首次启动需要选择模型文件位置

            ### 模型文件下载
            从 [HuggingFace](https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm) 下载 `gemma-4-E2B-it.litertlm` 文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
