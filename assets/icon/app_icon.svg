<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764BA2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>

  <!-- 对话气泡 -->
  <g transform="translate(256, 256)">
    <!-- 主气泡 -->
    <path d="M -80 -40 Q -80 -80 -40 -80 L 40 -80 Q 80 -80 80 -40 L 80 40 Q 80 80 40 80 L -20 80 L -40 100 L -40 80 L -40 80 Q -80 80 -80 40 Z"
          fill="white" opacity="0.95"/>

    <!-- 小气泡 -->
    <circle cx="100" cy="-60" r="25" fill="white" opacity="0.9"/>
    <circle cx="120" cy="-90" r="15" fill="white" opacity="0.85"/>

    <!-- AI 星星图标 -->
    <g transform="translate(0, -10)">
      <!-- 中心星星 -->
      <path d="M 0 -30 L 8 -8 L 30 0 L 8 8 L 0 30 L -8 8 L -30 0 L -8 -8 Z"
            fill="url(#sparkGradient)"/>

      <!-- 小星星装饰 -->
      <circle cx="-35" cy="-25" r="4" fill="#FFD700" opacity="0.8"/>
      <circle cx="35" cy="-20" r="3" fill="#FFA500" opacity="0.8"/>
      <circle cx="-30" cy="30" r="3" fill="#FFD700" opacity="0.8"/>
      <circle cx="32" cy="28" r="4" fill="#FFA500" opacity="0.8"/>

      <!-- 闪光效果 -->
      <path d="M -2 -45 L 0 -35 L 2 -45" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M 40 -5 L 30 -3 L 40 -1" stroke="#FFA500" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -40 5 L -30 3 L -40 1" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>

  <!-- 底部装饰波浪 -->
  <path d="M 0 450 Q 128 430 256 450 T 512 450 L 512 512 L 0 512 Z"
        fill="white" opacity="0.1"/>
</svg>
